# fly.toml app configuration file generated for easy-ticket-api on 2026-04-29T18:04:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'easy-ticket-api'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 512
